name: Lighthouse CI

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * 1"  # 毎週月曜 12:00 JST
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest

    env:
      MICROCMS_SERVICE_DOMAIN: ${{ secrets.MICROCMS_SERVICE_DOMAIN }}
      MICROCMS_API_KEY: ${{ secrets.MICROCMS_API_KEY }}
      NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        if: github.event_name == 'pull_request'
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        if: github.event_name == 'pull_request'
        run: npm ci

      - name: Build
        if: github.event_name == 'pull_request'
        run: npm run build

      - name: Run Lighthouse CI (PR)
        if: github.event_name == 'pull_request'
        run: |
          npm install -g @lhci/cli@0.14.x
          lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Setup Node.js
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run Lighthouse CI (Scheduled)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          npm install -g @lhci/cli@0.14.x
          lhci autorun \
            --collect.url=https://teal.yokohama \
            --collect.numberOfRuns=3 \
            --collect.settings.preset=desktop \
            --upload.target=temporary-public-storage \
            --assert.assertions.categories:performance="warn, minScore: 0.8" \
            --assert.assertions.categories:accessibility="error, minScore: 0.9" \
            --assert.assertions.categories:best-practices="warn, minScore: 0.8" \
            --assert.assertions.categories:seo="error, minScore: 0.9" \
            --no-lighthouserc
