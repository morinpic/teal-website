name: CMS Content Deploy

on:
  repository_dispatch:
    types: [cms-update]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Create .env.local
        run: |
          echo "MICROCMS_SERVICE_DOMAIN=${{ secrets.MICROCMS_SERVICE_DOMAIN }}" >> .env.local
          echo "MICROCMS_API_KEY=${{ secrets.MICROCMS_API_KEY }}" >> .env.local
          echo "NEXT_PUBLIC_SITE_URL=https://teal.yokohama" >> .env.local

      - name: Install dependencies
        run: npm ci

      - name: Build and deploy to Cloudflare
        run: npm run cf:deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
