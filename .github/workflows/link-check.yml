name: Link Check

on:
  schedule:
    - cron: "0 4 * * 1"  # 毎週月曜 13:00 JST
  workflow_dispatch:

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Link Checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --accept 200,204,301,302,403
            --exclude-mail
            --exclude 'localhost'
            --exclude 'placehold.jp'
            'https://teal.yokohama'
          fail: false

      - name: Upload report
        uses: actions/upload-artifact@v7
        with:
          name: link-check-report
          path: ./lychee/out.md
          retention-days: 30
